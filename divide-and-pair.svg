<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0 1L5 5L0 9" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
    </marker>
  </defs>

  <g stroke="currentColor" fill="currentColor">
    <!-- Circle border -->
    <circle cx="100" cy="100" r="95" fill="none" stroke-width="3"/>

    <!-- Ladder+arrows group centered: spans x=52..148 (center=100), y=25..175 (center=100) -->

    <!-- Rails -->
    <line x1="52" y1="25" x2="52" y2="175" stroke-width="3" stroke-linecap="round"/>
    <line x1="102" y1="25" x2="102" y2="175" stroke-width="3" stroke-linecap="round"/>

    <!-- Rungs -->
    <line x1="52" y1="38" x2="102" y2="38" stroke-width="3" stroke-linecap="round"/>
    <line x1="52" y1="60" x2="102" y2="60" stroke-width="3" stroke-linecap="round"/>

    <!-- Dots above fog -->
    <circle cx="77" cy="76" r="2.5"/>
    <circle cx="77" cy="87" r="2.5"/>

    <!-- Fog rung (thicker) -->
    <line x1="52" y1="102" x2="102" y2="102" stroke-width="4.5" stroke-linecap="round"/>

    <!-- Dots below fog -->
    <circle cx="77" cy="117" r="2.5"/>
    <circle cx="77" cy="128" r="2.5"/>

    <!-- Rungs below -->
    <line x1="52" y1="143" x2="102" y2="143" stroke-width="3" stroke-linecap="round"/>
    <line x1="52" y1="165" x2="102" y2="165" stroke-width="3" stroke-linecap="round"/>

    <!-- Climb: straight arrow top to fog -->
    <line x1="132" y1="38" x2="132" y2="96" stroke-width="2.5" marker-end="url(#a)" stroke-linecap="round"/>

    <!-- Pair: curved arrow fog to bottom -->
    <path d="M132 108 C155 135 155 155 132 175" fill="none" stroke-width="2.5" stroke-dasharray="5 4" marker-end="url(#a)"/>
  </g>
</svg>
