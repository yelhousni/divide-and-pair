<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0 1L5 5L0 9" fill="none" stroke="#000" stroke-width="1.5" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Rails -->
  <line x1="50" y1="20" x2="50" y2="180" stroke="#000" stroke-width="3" stroke-linecap="round"/>
  <line x1="110" y1="20" x2="110" y2="180" stroke="#000" stroke-width="3" stroke-linecap="round"/>

  <!-- Rungs -->
  <line x1="50" y1="35" x2="110" y2="35" stroke="#000" stroke-width="3" stroke-linecap="round"/>
  <line x1="50" y1="60" x2="110" y2="60" stroke="#000" stroke-width="3" stroke-linecap="round"/>

  <!-- Dots -->
  <circle cx="80" cy="78" r="2.5" fill="#000"/>
  <circle cx="80" cy="90" r="2.5" fill="#000"/>

  <!-- Fog rung (thicker) -->
  <line x1="50" y1="108" x2="110" y2="108" stroke="#000" stroke-width="4.5" stroke-linecap="round"/>

  <!-- Rungs below -->
  <line x1="50" y1="133" x2="110" y2="133" stroke="#000" stroke-width="3" stroke-linecap="round"/>
  <line x1="50" y1="158" x2="110" y2="158" stroke="#000" stroke-width="3" stroke-linecap="round"/>

  <!-- Climb: straight arrow top to fog -->
  <line x1="145" y1="35" x2="145" y2="102" stroke="#000" stroke-width="2.5" marker-end="url(#a)" stroke-linecap="round"/>

  <!-- Pair: curved arrow fog to bottom -->
  <path d="M145 114 C168 140 168 155 145 170" fill="none" stroke="#000" stroke-width="2.5" stroke-dasharray="5 4" marker-end="url(#a)"/>
</svg>