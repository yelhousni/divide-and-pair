<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 440">
  <defs>
    <marker id="ap" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0 1L5 5L0 9" fill="none" stroke="#8855cc" stroke-width="1.5" stroke-linejoin="round"/>
    </marker>
    <marker id="ab" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0 1L5 5L0 9" fill="none" stroke="#cc4444" stroke-width="1.5" stroke-linejoin="round"/>
    </marker>
    <marker id="at" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0 1L5 5L0 9" fill="none" stroke="#2299aa" stroke-width="1.5" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Rails -->
  <line x1="60" y1="30" x2="60" y2="380" stroke="#555" stroke-width="2"/>
  <line x1="100" y1="30" x2="100" y2="380" stroke="#555" stroke-width="2"/>

  <!-- Symmetric ladder -->
  <line x1="60" y1="55" x2="100" y2="55" stroke="#555" stroke-width="2"/>
  <line x1="60" y1="100" x2="100" y2="100" stroke="#555" stroke-width="2"/>
  <circle cx="80" cy="135" r="1.5" fill="#888"/>
  <circle cx="80" cy="145" r="1.5" fill="#888"/>
  <circle cx="80" cy="155" r="1.5" fill="#888"/>
  <line x1="60" y1="190" x2="100" y2="190" stroke="#e08030" stroke-width="2.5"/>
  <circle cx="80" cy="225" r="1.5" fill="#888"/>
  <circle cx="80" cy="235" r="1.5" fill="#888"/>
  <circle cx="80" cy="245" r="1.5" fill="#888"/>
  <line x1="60" y1="280" x2="100" y2="280" stroke="#555" stroke-width="2"/>
  <line x1="60" y1="325" x2="100" y2="325" stroke="#555" stroke-width="2"/>

  <!-- Rung labels -->
  <text x="52" y="59" text-anchor="end" font-family="monospace" font-size="9" fill="#555">E[r]</text>
  <text x="52" y="104" text-anchor="end" font-family="monospace" font-size="9" fill="#555">E[2r]</text>
  <text x="52" y="194" text-anchor="end" font-family="monospace" font-size="9" fill="#e08030">E[d]</text>
  <text x="52" y="329" text-anchor="end" font-family="monospace" font-size="9" fill="#555">E(𝔽q)</text>
  <text x="112" y="194" font-family="monospace" font-size="9" fill="#e08030">t</text>

  <!-- === Pornin (purple): climb, then pair === -->
  <line x1="140" y1="325" x2="140" y2="113" stroke="#8855cc" stroke-width="1.5" marker-end="url(#ap)"/>
  <path d="M140 100 C150 82 150 66 140 55" fill="none" stroke="#8855cc" stroke-width="1.5" stroke-dasharray="3 2" marker-end="url(#ap)"/>
  <text x="132" y="360" text-anchor="middle" font-family="monospace" font-size="8" fill="#8855cc">Pornin</text>
  <text x="132" y="371" text-anchor="middle" font-family="monospace" font-size="7" fill="#8855cc">climb all−1</text>
  <text x="132" y="381" text-anchor="middle" font-family="monospace" font-size="7" fill="#8855cc">pair 1</text>

  <!-- === Koshelev (red): pair all the way === -->
  <path d="M185 325 C220 245 220 125 185 55" fill="none" stroke="#cc4444" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#ab)"/>
  <text x="177" y="360" text-anchor="middle" font-family="monospace" font-size="8" fill="#cc4444">Koshelev</text>
  <text x="177" y="371" text-anchor="middle" font-family="monospace" font-size="7" fill="#cc4444">climb 0</text>
  <text x="177" y="381" text-anchor="middle" font-family="monospace" font-size="7" fill="#cc4444">pair all</text>

  <!-- === Divide-And-Pair (teal): divide to E[d], then pair === -->
  <line x1="240" y1="325" x2="240" y2="203" stroke="#2299aa" stroke-width="1.5" marker-end="url(#at)"/>
  <path d="M240 190 C262 142 262 92 240 55" fill="none" stroke="#2299aa" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#at)"/>
  <text x="242" y="360" text-anchor="middle" font-family="monospace" font-size="8" fill="#2299aa">Divide-And-Pair</text>
  <text x="242" y="371" text-anchor="middle" font-family="monospace" font-size="7" fill="#2299aa">climb all−t</text>
  <text x="242" y="381" text-anchor="middle" font-family="monospace" font-size="7" fill="#2299aa">pair t</text>
</svg>
